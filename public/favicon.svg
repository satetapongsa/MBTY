<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d2d" />
      <stop offset="100%" stop-color="#0b0d14" />
    </linearGradient>
    
    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Rectangle -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" />
  <rect width="96" height="96" x="2" y="2" rx="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- 8 Intelligences Nodes -->
  <g transform="translate(50, 50)">
    <!-- Connecting Lines -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
    
    <!-- Lines to center -->
    <line x1="0" y1="0" x2="0" y2="-26" stroke="rgba(46, 204, 113, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="18.38" y2="-18.38" stroke="rgba(52, 152, 219, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="26" y2="0" stroke="rgba(155, 89, 182, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="18.38" y2="18.38" stroke="rgba(231, 76, 60, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="0" y2="26" stroke="rgba(241, 196, 15, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="-18.38" y2="18.38" stroke="rgba(230, 126, 34, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="-26" y2="0" stroke="rgba(26, 188, 156, 0.4)" stroke-width="2" />
    <line x1="0" y1="0" x2="-18.38" y2="-18.38" stroke="rgba(236, 240, 241, 0.4)" stroke-width="2" />

    <!-- Colored Nodes -->
    <circle cx="0" cy="-26" r="6" fill="#2ecc71" filter="url(#glow)"/>
    <circle cx="18.38" cy="-18.38" r="6" fill="#3498db" filter="url(#glow)"/>
    <circle cx="26" cy="0" r="6" fill="#9b59b6" filter="url(#glow)"/>
    <circle cx="18.38" cy="18.38" r="6" fill="#e74c3c" filter="url(#glow)"/>
    <circle cx="0" cy="26" r="6" fill="#f1c40f" filter="url(#glow)"/>
    <circle cx="-18.38" cy="18.38" r="6" fill="#e67e22" filter="url(#glow)"/>
    <circle cx="-26" cy="0" r="6" fill="#1abc9c" filter="url(#glow)"/>
    <circle cx="-18.38" cy="-18.38" r="6" fill="#ecf0f1" filter="url(#glow)"/>

    <!-- Center Core -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="4" fill="#8c52ff"/>
  </g>
</svg>